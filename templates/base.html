<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Demo — {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-blue-400 tracking-tight">Sentinel Demo</a>
            <div class="flex gap-4 text-sm font-medium">
                <a href="/simple/" class="text-gray-300 hover:text-white transition-colors">Simple</a>
                <a href="/guard/" class="text-gray-300 hover:text-white transition-colors">Protegida</a>
                <a href="/dynamic/" class="text-gray-300 hover:text-white transition-colors">Dinámica</a>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center text-gray-500 text-sm">
        Sentinel Hardware Demo
    </footer>
</body>
</html>
